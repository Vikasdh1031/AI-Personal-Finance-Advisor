<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>💰 AI Personal Finance Advisor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">
    <header>
        <h1>💬 AI Personal Finance Advisor</h1>
        <p class="subtitle">Ask anything about saving, spending & budgeting!</p>
    </header>

    <div class="chat-box" id="chat-box">
        <div class="bot-message">
            👋 Hi! I’m your smart finance assistant. <br>
            Ask me something like <b>“How can I save more money this month?”</b>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask your question..." autocomplete="off" />
        <button id="send-btn">Send</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
